# This is a Databricks asset bundle definition for dbx_connect.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dbx_connect
  uuid: 415fdba2-3d77-467b-9963-56ceff3e3cf4

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-9899c861-f498.cloud.databricks.com
    variables:
      catalog: workspace
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-9899c861-f498.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/tkabelan@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/tkabelan@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: tkabelan@gmail.com
        level: CAN_MANAGE
